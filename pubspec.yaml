name: yaru
description: Common flutter widgets useful for building desktop and web applications.
homepage: https://github.com/ubuntu/yaru.dart
issue_tracker: https://github.com/ubuntu/yaru.dart/issues
version: 10.1.0
publish_to: "none"

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  animated_vector: ^0.2.2
  animated_vector_annotations: ^0.2.2
  assorted_layout_widgets: ^12.6.1
  collection: ^1.19.1
  dbus:
    git: https://github.com/kumsumit/dbus.dart.git
  flutter:
    sdk: flutter
  gsettings:
    git: https://github.com/kumsumit/gsettings.dart
  gtk: ^2.1.0
  intl: ^0.20.0
  platform: ^3.1.5
  platform_linux: ^0.1.2
  yaru_window: ^0.2.2

dev_dependencies:
  animated_vector_gen: ^0.2.1
  build_runner: ^2.4.13
  flutter_lints: ">=6.0.0 <7.0.0"
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  plugin_platform_interface: ^2.1.8
  yaru_window_platform_interface: ^0.1.3

flutter:
  fonts:
    - family: YaruIcons
      fonts:
        - asset: assets/yaru_icons.otf
    - family: UbuntuSansMono
      fonts:
        - asset: assets/fonts/UbuntuSansMono.ttf
        - asset: assets/fonts/UbuntuSansMono-Italic.ttf
          style: italic
    - family: UbuntuSans
      fonts:
        - asset: assets/fonts/UbuntuSans.ttf
        - asset: assets/fonts/UbuntuSans-Italic.ttf
          style: italic

icon_font:
  input_svg_dir: "assets/icons/"
  output_font_file: "assets/yaru_icons.otf"

  output_class_file: "lib/src/icons/yaru_icons.dart"
  symlink_map_file: "assets/symlinks.json"
  class_name: "YaruIcons"
  package: yaru
  format: false
  naming_strategy: "snake"

  font_name: "YaruIcons"
  normalize: false
  ignore_shapes: false

  recursive: true
  verbose: true
